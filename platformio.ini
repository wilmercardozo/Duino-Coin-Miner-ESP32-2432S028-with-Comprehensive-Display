[platformio]
default_envs = nerdduino-pro

[env:nerdduino-pro]
platform = espressif32
board = esp32dev
framework = arduino
board_build.flash_size = 4MB
board_build.partitions = partitions.csv
monitor_speed = 115200
lib_ldf_mode = deep+
upload_speed = 921600
lib_ignore = Async TCP

extra_scripts = pre:scripts/copy_lv_conf.py

lib_deps =
    lvgl/lvgl@9.2.2
    bodmer/TFT_eSPI@^2.5.43
    bblanchon/ArduinoJson@^7.0.0
    mathieucarbou/ESP Async WebServer@^3.0.6
    ESP32Async/AsyncTCP@^3.3.2
    https://github.com/PaulStoffregen/XPT2046_Touchscreen.git

build_flags =
    ; TFT_eSPI — CYD ESP32-2432S028 pins (avoids editing User_Setup_Select.h)
    -DUSER_SETUP_LOADED
    -DILI9341_2_DRIVER
    -DTFT_WIDTH=240
    -DTFT_HEIGHT=320
    -DTFT_MOSI=13
    -DTFT_SCLK=14
    -DTFT_CS=15
    -DTFT_DC=2
    -DTFT_RST=-1
    -DTFT_MISO=-1
    -DTFT_BL=21
    -DTFT_BACKLIGHT_ON=1
    -DSPI_FREQUENCY=40000000
    -DSPI_READ_FREQUENCY=20000000
    -DLOAD_GLCD
    -DLOAD_FONT2
    -DLOAD_FONT4
    -DLOAD_GFXFF
    -DSMOOTH_FONT
    ; LVGL — lv_conf.h in include/ (found via __has_include + LV_CONF_INCLUDE_SIMPLE)
    ; Note: LVGL source patched to use non-relative lv_conf_internal.h includes
    -DLV_LVGL_H_INCLUDE_SIMPLE
    -DLV_CONF_INCLUDE_SIMPLE
    -I${PROJECT_INCLUDE_DIR}
    -I${FRAMEWORK_DIR}/libraries/WiFi/src

[env:native]
platform = native
test_build_src = no
lib_deps =
    bblanchon/ArduinoJson@^7.0.0
build_flags =
    -std=gnu++11
    -I${PROJECT_INCLUDE_DIR}
